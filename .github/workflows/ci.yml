name: demo-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Confirm demo structure
        run: |
          test -f README.md
          test -f package.json
          test -f tsconfig.json
          test -f src/app.ts
          test -f tests/app.test.ts
